<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Miss Leen</title>
  <script>
    // GitHub Pages 404 redirect for SPA
    // With HashRouter this is rarely needed, but kept as fallback
    var l = window.location;
    l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + 1).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(1).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
